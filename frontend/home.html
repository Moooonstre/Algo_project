<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Accueil - Social Gate</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <span class="brand">Social Gate</span>
      <button id="logout-btn" class="ghost">Se déconnecter</button>
    </header>
    <main class="card">
      <h1>Bienvenue, <span id="display-name">…</span></h1>
      <dl class="profile">
        <dt>Nom d'utilisateur</dt>
        <dd id="p-username"></dd>
        <dt>Email</dt>
        <dd id="p-email"></dd>
        <dt>Nom complet</dt>
        <dd id="p-fullname"></dd>
        <dt>Date de naissance</dt>
        <dd id="p-birth"></dd>
        <dt>Membre depuis</dt>
        <dd id="p-created"></dd>
      </dl>
      <p class="muted">
        Cette page est la base sur laquelle viendront se brancher les services
        Social Gate (timeline, recommandations, filtres) au fur et à mesure
        des prochaines itérations du projet.
      </p>
    </main>
    <script src="/app.js"></script>
    <script>
      SocialGate.bootHomePage();
    </script>
  </body>
</html>
